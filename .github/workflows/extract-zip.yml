name: 📦 Extract Zip

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📂 Extract baloch-diamond.zip
        run: |
          if [ ! -f "baloch-diamond.zip" ]; then
            echo "❌ فایل baloch-diamond.zip پیدا نشد!"
            exit 1
          fi
          unzip -o baloch-diamond.zip
          rm baloch-diamond.zip

      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Extract baloch-diamond.zip"
            git push
            echo "✅ Done!"
          else
            echo "✅ No changes."
          fi
