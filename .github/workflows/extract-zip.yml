name: 📦 Extract & Replace Theme Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    name: 📂 Unzip Theme & Replace Old Directory
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔍 Verify baloch-diamond.zip Exists
        run: |
          if [ ! -f "baloch-diamond.zip" ]; then
            echo "❌ Error: baloch-diamond.zip not found in the root directory!"
            exit 1
          fi

      - name: 🤐 Extract and Overwrite Theme Directory
        run: |
          # 1. Delete the old inner theme folder completely to prevent file duplication
          rm -rf baloch-diamond/
          
          # 2. Extract the new structured theme directly
          unzip -o baloch-diamond.zip
          
          # 3. Clean up the zip file from repo
          rm baloch-diamond.zip
          echo "✅ Theme extraction and replacement completed successfully."

      - name: 🚀 Commit and Push Updated Source Codes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Auto-extract baloch-diamond.zip: Cleanly replaced theme folder with v1.1.0"
            git push
            echo "✅ Source codes pushed to main branch successfully."
          else
            echo "✅ No changes to push."
          fi
